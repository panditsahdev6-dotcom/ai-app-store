name: ai_app_store
description: "AI App Store with Firebase Integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.9.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase Core
  firebase_core: ^4.4.0

  # 🔐 Firebase Auth
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1

  # 🗄 Firestore Database
  cloud_firestore: ^6.1.2

  # 🧠 State Management
  provider: ^6.0.5

  # 🌐 HTTP / API
  http: ^1.2.0

  # 🔗 URL Launcher
  url_launcher: ^6.2.5

  # 🖼 Image Caching
  cached_network_image: ^3.2.3

  # 📶 Connectivity Check
  connectivity_plus: ^7.0.0

  # ⭐ Icons
  font_awesome_flutter: ^10.4.0

  # 🆕 App Version Check (Auto Update System)
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700